<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Category</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background-color:#f4f6fb;
    font-family:Segoe UI;
}

/* Sidebar */

.sidebar{
    height:100vh;
    width:250px;
    background:#0d1b3e;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:#cfd8ff;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2f4acb;
    color:white;
}

/* Main Content */

.main-content{
    margin-left:270px;
    padding:40px;
}

/* Card */

.card{
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* Button */

.btn-primary{
    background:#2f4acb;
    border:none;
}

.btn-primary:hover{
    background:#1f36a8;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}">
<i class="bi bi-house"></i> Infrastructure
</a>

<a href="{% url 'category' %}" class="active">
<i class="bi bi-grid"></i> Categories
</a>

<a href="{% url 'subcategory' %}">
<i class="bi bi-diagram-3"></i> Sub Categories
</a>

<a href="{% url 'offer_view' %}">
<i class="bi bi-gift"></i> Offer Management
</a>

<a href="{% url 'discount_view' %}">
<i class="bi bi-percent"></i> Manage Discount
</a>

<a href="{% url 'coupon_view' %}">
<i class="bi bi-ticket-perforated"></i> Coupon Management
</a>

</div>


<!-- Main Content -->

<div class="main-content">

<div class="container-fluid">

<div class="card p-4">

<h3 class="mb-4">Add New Category</h3>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Category Name</label>

<input type="text"
class="form-control"
name="name"
required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea
class="form-control"
name="description"
required></textarea>

</div>

<button type="submit" class="btn btn-primary">
Save Category
</button>

<a href="{% url 'category' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
