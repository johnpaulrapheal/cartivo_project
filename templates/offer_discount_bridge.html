<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offer Discount Bridge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:'Segoe UI',sans-serif;
}

.container-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-top:40px;
}

.title{
font-weight:600;
margin-bottom:20px;
}

.btn-primary{
background:#0d6efd;
border:none;
}

.table{
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="container-box">

<h4 class="title">Link Offer With Discount</h4>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-5">

<label class="form-label">Select Offer</label>

<select name="offer" class="form-control" required>

<option value="">Choose Offer</option>

{% for offer in offers %}

<option value="{{offer.id}}">
{{offer.title}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-5">

<label class="form-label">Select Discount</label>

<select name="discount" class="form-control" required>

<option value="">Choose Discount</option>

{% for discount in discounts %}

<option value="{{discount.id}}">
{{discount.name}} - {{discount.discount_value}}
</option>

{% endfor %}

</select>

</div>


<div class="col-md-2 d-flex align-items-end">

<button type="submit" class="btn btn-primary w-100">
Add
</button>

</div>

</div>

</form>


<hr>


<h5 class="mt-4">Offer Discount List</h5>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Offer</th>
<th>Discount</th>
</tr>

</thead>

<tbody>

{% for bridge in bridges %}

<tr>

<td>{{bridge.id}}</td>

<td>{{bridge.offer.title}}</td>

<td>{{bridge.discount.name}} ({{bridge.discount.discount_value}})</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">No Data Found</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>


<script>

document.querySelector("form").addEventListener("submit",function(){

alert("Offer and Discount Linked Successfully");

});

</script>


</body>
</html>
