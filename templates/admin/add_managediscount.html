<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add SubCategory</title>

    <!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    font-family:'Segoe UI',sans-serif;
}

/* Sidebar */
.sidebar{
    height:100vh;
    width:250px;
    position:fixed;
    left:0;
    top:0;
    background:linear-gradient(180deg,#0f1c3f,#0a122b);
    padding:25px 15px;
    color:white;
}

.sidebar h4{
    font-weight:bold;
}

.sidebar .nav-link{
    color:#cbd3ff;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:8px;
    transition:.3s;
}

.sidebar .nav-link:hover,
.sidebar .nav-link.active{
    background:#2d4ac7;
    color:white;
}

/* Main Content */
.main-content{
    margin-left:260px;
    padding:40px;
}

/* Card */
.card{
    border-radius:12px;
}

/* Button */
.btn-primary{
    background:#2d4ac7;
    border:none;
}

.btn-primary:hover{
    background:#1f37a5;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<h4>CARTIVO.</h4>
<p class="small text-muted">SYSTEM CONTROLLER</p>

<nav class="nav flex-column mt-4">

<a class="nav-link" href="{% url 'admin_index' %}">
<i class="fa fa-home me-2"></i> Infrastructure
</a>

<a class="nav-link" href="#">
<i class="fa fa-user-check me-2"></i> Merchant Approvals
</a>

<a class="nav-link active" href="{% url 'category' %}">
<i class="fa fa-layer-group me-2"></i> Categories
</a>

<a class="nav-link" href="#">
<i class="fa fa-heartbeat me-2"></i> Platform Health
</a>

</nav>

</div>
</body>


        <form method="POST">
            {% csrf_token %}
            <div class="main-content">
            <div class="mb-3">
                <label class="form-label">Dis Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="">Select Category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="is_active" class="form-select">
                    <option value="True">Active</option>
                    <option value="False">Inactive</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Save SubCategory
            </button>

            <a href="{% url 'add_subcategory' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>

    </div>
</div>
</div>

</body>
</html>
