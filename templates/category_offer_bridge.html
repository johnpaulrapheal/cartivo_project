<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Link Category With Offer</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    font-family:'Segoe UI',sans-serif;
}

.main-card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.page-title{
    font-size:26px;
    font-weight:600;
    margin-bottom:25px;
}

.section-title{
    font-size:20px;
    font-weight:600;
    margin-top:30px;
    margin-bottom:15px;
}

.form-select{
    height:45px;
}

.btn-add{
    height:45px;
    width:120px;
    font-weight:500;
}

.table thead{
    background:#1f2630;
    color:white;
}

</style>
</head>


<body>

<div class="container mt-5">

<div class="main-card">

<div class="page-title">
Link Category With Offer
</div>

<form method="POST">
{% csrf_token %}

<div class="row align-items-end">

<div class="col-md-5">
<label class="form-label">Select Category</label>

<select class="form-select" name="category_id" required>
<option value="">Choose Category</option>

{% for c in category %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-5">
<label class="form-label">Select Offer</label>

<select class="form-select" name="offer_id" required>
<option value="">Choose Offer</option>

{% for o in offer %}
<option value="{{o.id}}">{{o.title}}</option>
{% endfor %}

</select>
</div>


<div class="col-md-2">
<button class="btn btn-primary btn-add w-100">
Add
</button>
</div>

</div>

</form>


<hr class="mt-4">


<div class="section-title">
Category Offer List
</div>


<div class="table-responsive">

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Category</th>
<th>Offer</th>
</tr>
</thead>

<tbody>

{% for b in bridges %}

<tr>
<td>{{b.id}}</td>
<td>{{b.category.name}}</td>
<td>{{b.offer.title}}</td>
</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">
No Data Found
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
