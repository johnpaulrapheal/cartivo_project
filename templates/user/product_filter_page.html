<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Laptop Listings</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- TOP NAVBAR -->

<header class="bg-gray-900 text-white">

<div class="max-w-7xl mx-auto flex items-center justify-between p-3">

<div class="flex items-center gap-4">

<h1 class="text-2xl font-bold">amazon.in</h1>

<p class="text-sm hidden md:block">
Delivering to Kochi 682024
</p>

</div>


<div class="flex-1 mx-6 hidden md:flex">

<input
class="w-full p-2 rounded-l-md text-black"
placeholder="Search laptops"
/>

<button class="bg-yellow-400 px-4 rounded-r-md">
🔍
</button>

</div>

<div class="flex gap-6 text-sm">

<div>Hello, sign in</div>
<div>Returns & Orders</div>
<div>Cart</div>

</div>

</div>

</header>


<!-- CATEGORY BAR -->

<div class="bg-gray-800 text-white text-sm">

<div class="max-w-7xl mx-auto flex gap-6 p-2 overflow-x-auto">

<span>All</span>
<span>Fresh</span>
<span>Best Sellers</span>
<span>Mobiles</span>
<span>Today's Deals</span>
<span>Prime</span>
<span>Electronics</span>
<span>Home & Kitchen</span>

</div>

</div>



<!-- MAIN CONTAINER -->

<div class="max-w-7xl mx-auto flex mt-4">

<!-- SIDEBAR -->

<aside class="hidden lg:block w-64 bg-white p-4 border">

<h3 class="font-bold mb-2">Delivery Day</h3>

<div class="space-y-1 text-sm">

<label class="block"><input type="checkbox"> Get It Today</label>
<label class="block"><input type="checkbox"> Get it Tomorrow</label>
<label class="block"><input type="checkbox"> Get it in 2 Days</label>

</div>


<h3 class="font-bold mt-6 mb-2">RAM Size</h3>

<div class="space-y-1 text-sm">

<label class="block"><input type="checkbox"> 4 GB</label>
<label class="block"><input type="checkbox"> 8 GB</label>
<label class="block"><input type="checkbox"> 16 GB</label>

</div>


<h3 class="font-bold mt-6 mb-2">Brands</h3>

<div class="space-y-1 text-sm">

<label class="block"><input type="checkbox"> HP</label>
<label class="block"><input type="checkbox"> Lenovo</label>
<label class="block"><input type="checkbox"> ASUS</label>
<label class="block"><input type="checkbox"> Dell</label>

</div>

</aside>



<!-- PRODUCTS -->

<main class="flex-1 p-4">

<h2 class="text-lg font-semibold mb-4">
1-24 of over 60,000 results for "laptops"
</h2>

<div
id="products"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6"
>

</div>

</main>

</div>


<script src="script.js"></script>

</body>
</html>
