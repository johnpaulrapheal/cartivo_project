<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Coupon</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
    font-family:Segoe UI;
}

/* Sidebar */

.sidebar{
    height:100vh;
    width:250px;
    background:#0d1b3e;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h4{
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:#cfd8ff;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2f4acb;
    color:white;
}

/* Main Content */

.main-content{
    margin-left:270px;
    padding:40px;
}

/* Form Card */

.container-box{
    max-width:600px;
}

.card{
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* Button */

.btn-primary{
    background:#2f4acb;
    border:none;
}

.btn-primary:hover{
    background:#1f36a8;
}

</style>

</head>
<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="mb-4">CARTIVO</h4>

<a href="{% url 'admin_index' %}">
<i class="bi bi-house"></i> Infrastructure
</a>

<a href="{% url 'category' %}">
<i class="bi bi-grid"></i> Categories
</a>

<a href="{% url 'subcategory' %}">
<i class="bi bi-diagram-3"></i> Sub Categories
</a>

<a href="{% url 'offer_view' %}">
<i class="bi bi-gift"></i> Offer Management
</a>

<a href="{% url 'discount_view' %}">
<i class="bi bi-percent"></i> Manage Discount
</a>

<a href="{% url 'coupon_view' %}" class="active">
<i class="bi bi-ticket-perforated"></i> Coupon Management
</a>

</div>


<!-- Main Content -->

<div class="main-content">

<div class="container container-box">

<div class="card p-4">

<h3 class="mb-4 text-center">Add New Coupon</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Coupon Code</label>
<input type="text" name="code" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Discount (%)</label>
<input type="number" name="discount_value" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Valid From</label>
<input type="date" name="valid_from" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Valid To</label>
<input type="date" name="valid_to" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Usage Limit</label>
<input type="number" name="usage_limit" class="form-control">
</div>

<div class="d-flex justify-content-between">

<a href="{% url 'coupon_view' %}" class="btn btn-secondary">
Back
</a>

<button type="submit" class="btn btn-primary">
Create Coupon
</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
